<!DOCTYPE html>
<html>
<head>
    <title>FounderFlow | Login</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; }
        .login-box { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 10px; }
        input { margin: 10px; padding: 10px; width: 200px; }
        button { padding: 10px 20px; background: #764ba2; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>FounderFlow Login</h2>
        <form action="LoginServlet" method="POST">
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.jsp">Register here</a></p>
    </div>
</body>
</html>
